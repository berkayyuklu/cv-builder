<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CV Builder Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c14;--bg2:#13131f;--bg3:#1a1a2a;--surface:#1e1e30;
  --border:#2a2a42;--text:#e8e8f8;--text2:#8888aa;
  --accent:#6c63ff;--red:#ff5c7a;--green:#43e87b;
  --r:10px;--font:'Syne',sans-serif;--body:'DM Sans',sans-serif;
}
body{font-family:var(--body);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
input,textarea,select{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:var(--r);padding:9px 13px;font-family:var(--body);font-size:13px;width:100%;outline:none;transition:border-color .2s}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
input::placeholder,textarea::placeholder{color:var(--text2)}
label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.fg{margin-bottom:16px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
@media(max-width:600px){.g2,.g3{grid-template-columns:1fr}}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--r);border:none;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;text-decoration:none}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{background:#5a52e0;transform:translateY(-1px);box-shadow:0 6px 20px rgba(108,99,255,.35)}
.btn-s{background:transparent;color:var(--text);border:1px solid var(--border)}.btn-s:hover{border-color:var(--accent);color:var(--accent)}
.btn-d{background:rgba(255,92,122,.12);color:var(--red);border:1px solid rgba(255,92,122,.25)}.btn-d:hover{background:rgba(255,92,122,.22)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px}
.page{display:none}.page.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.fade{animation:fi .35s ease forwards}
/* ─── NAVBAR ─── */
#navbar{position:sticky;top:0;z-index:100;height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:rgba(12,12,20,.88);backdrop-filter:blur(18px);border-bottom:1px solid var(--border)}
#navbar .logo{font-family:var(--font);font-weight:800;font-size:16px;cursor:pointer;display:flex;align-items:center;gap:8px}
#navbar .logo span{color:var(--accent)}
/* ─── AUTH ─── */
#authPage{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at 30% 40%,rgba(108,99,255,.12) 0%,transparent 60%)}
.authBox{width:100%;max-width:420px}
.authBox h1{font-family:var(--font);font-size:28px;font-weight:800;margin-bottom:6px}
.authBox p{color:var(--text2);margin-bottom:28px;font-size:14px}
.divider{display:flex;align-items:center;gap:10px;margin:18px 0;color:var(--text2);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.gBtn{width:100%;padding:11px;display:flex;align-items:center;justify-content:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:var(--body);font-size:13px;cursor:pointer;transition:all .2s}
.gBtn:hover{border-color:var(--accent)}
.gIcon{width:18px;height:18px}
.err{background:rgba(255,92,122,.1);border:1px solid rgba(255,92,122,.3);color:var(--red);border-radius:var(--r);padding:9px 13px;font-size:12px;margin-bottom:14px}
.tog{font-size:13px;text-align:center;margin-top:18px;color:var(--text2)}
.tog a{color:var(--accent);cursor:pointer;font-weight:600;text-decoration:none}
/* ─── DASHBOARD ─── */
#dashPage{max-width:1100px;margin:0 auto;padding:36px 24px}
.dashHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:36px;flex-wrap:wrap;gap:12px}
.dashHead h1{font-family:var(--font);font-size:26px;font-weight:800}
.cvGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px}
.cvCard{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:all .2s;cursor:default}
.cvCard:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,0,0,.3)}
.cvCardTop{height:6px}
.cvCardBody{padding:18px}
.cvCardTitle{font-family:var(--font);font-weight:700;font-size:15px;margin-bottom:4px}
.cvCardSub{color:var(--text2);font-size:12px;margin-bottom:14px}
.cvCardActions{display:flex;gap:8px}
.empty{text-align:center;padding:60px 20px;border:2px dashed var(--border);border-radius:14px}
.empty .ei{font-size:42px;margin-bottom:12px}
.empty h3{font-family:var(--font);margin-bottom:6px}
.empty p{color:var(--text2);font-size:13px;margin-bottom:18px}
/* ─── BUILDER ─── */
#buildPage{display:none}
#buildPage.active{display:flex;flex-direction:column}
#buildTop{position:sticky;top:60px;z-index:90;background:rgba(12,12,20,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
#buildTitle{background:transparent;border:1px solid var(--border);border-radius:var(--r);padding:7px 13px;font-size:13px;width:180px}
#buildBody{display:flex;flex:1;min-height:0}
#stepSidebar{width:200px;flex-shrink:0;padding:20px 14px;border-right:1px solid var(--border);position:sticky;top:120px;align-self:flex-start}
.stepBtn{width:100%;display:flex;align-items:center;gap:8px;padding:9px 11px;border-radius:var(--r);background:transparent;border:1px solid transparent;color:var(--text2);font-family:var(--body);font-size:12px;cursor:pointer;transition:all .15s;text-align:left;margin-bottom:3px}
.stepBtn.active{background:rgba(108,99,255,.14);border-color:rgba(108,99,255,.4);color:var(--accent)}
.stepBtn.done{color:var(--text)}
.stepBtn .si{font-size:14px;flex-shrink:0}
#formArea{flex:1;padding:24px;max-width:660px}
#previewArea{flex:1;padding:20px;background:var(--bg2);min-width:0}
.sectionCard{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:16px}
.sectionCard h2{font-family:var(--font);font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.entryBlock{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.entryHead{padding:11px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.entryTitle{font-weight:600;font-size:13px}
.entrySub{color:var(--text2);font-size:11px}
.entryBody{padding:14px;border-top:1px solid var(--border);display:none}
.entryBody.open{display:block}
.tag{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:99px;background:rgba(108,99,255,.13);border:1px solid rgba(108,99,255,.25);color:var(--accent);font-size:12px;margin:3px}
.tagX{background:none;border:none;color:var(--text2);cursor:pointer;font-size:14px;line-height:1}
/* ─── CUSTOMIZE ─── */
.themeGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;margin-bottom:20px}
.themeCard{border-radius:var(--r);overflow:hidden;cursor:pointer;border:2px solid var(--border);transition:all .2s}
.themeCard.sel{border-color:var(--accent);transform:scale(1.03)}
.themePreview{height:60px;padding:10px}
.themeName{padding:6px 8px;background:var(--bg3);font-size:11px;font-weight:600}
.colorRow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.colorDot{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s}
.colorDot.sel{border-color:#fff;transform:scale(1.15);box-shadow:0 0 0 2px var(--accent)}
/* ─── CV PREVIEW ─── */
#cvWrap{background:#fff;box-shadow:0 16px 50px rgba(0,0,0,.5);border-radius:4px;max-width:740px;min-height:1040px;margin:0 auto}
/* ─── STEP NAV ─── */
.stepNav{display:flex;justify-content:space-between;margin-top:20px}
/* ─── TIP BOX ─── */
.tip{padding:12px 14px;border-radius:var(--r);background:rgba(108,99,255,.08);border:1px solid rgba(108,99,255,.2);margin-top:12px}
.tip b{color:var(--accent);font-size:12px}
.tip p{color:var(--text2);font-size:11px;margin-top:3px;line-height:1.6}
/* ─── PHOTO ─── */
.photoPrev{width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid var(--accent)}
.photoPlaceholder{width:80px;height:80px;border-radius:50%;background:var(--bg3);border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer}
/* ─── SKILL BAR ─── */
.skillBar{height:4px;background:#e8e8e8;border-radius:2px;overflow:hidden;margin-top:3px}
.skillBarFill{height:100%;border-radius:2px}
/* ─── RESPONSIVE ─── */
@media(max-width:900px){
  #stepSidebar{display:none}
  #previewArea{display:none}
  #formArea{max-width:100%}
}
</style>
</head>
<body>

<!-- NAVBAR -->
<div id="navbar" style="display:none">
  <div class="logo" onclick="goTo('dash')">✦ CV Builder <span>Pro</span></div>
  <div id="navUser" style="display:flex;align-items:center;gap:10px">
    <span id="navName" style="font-size:13px;color:var(--text2)"></span>
    <button class="btn btn-s" style="padding:6px 12px;font-size:12px" onclick="doLogout()">Çıkış</button>
  </div>
</div>

<!-- AUTH PAGE -->
<div id="authPage" class="page active">
  <div class="authBox fade">
    <div style="font-size:28px;margin-bottom:12px">✦</div>
    <h1>CV Builder Pro</h1>
    <p>Profesyonel CV'ni dakikalar içinde oluştur.</p>

    <button class="gBtn" onclick="googleLogin()">
      <svg class="gIcon" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Google ile Giriş Yap
    </button>

    <div class="divider">veya e-posta ile</div>

    <div id="authErr" class="err" style="display:none"></div>

    <div id="regName" class="fg" style="display:none">
      <label>Ad Soyad</label>
      <input id="inName" type="text" placeholder="Ahmet Yılmaz"/>
    </div>
    <div class="fg">
      <label>E-posta</label>
      <input id="inEmail" type="email" placeholder="ornek@email.com"/>
    </div>
    <div class="fg">
      <label>Şifre</label>
      <input id="inPw" type="password" placeholder="••••••••"/>
    </div>
    <button class="btn btn-p" style="width:100%;justify-content:center;padding:11px" id="authBtn" onclick="emailAuth()">Giriş Yap</button>
    <div class="tog">
      <span id="togText">Hesabın yok mu?</span>
      <a onclick="toggleMode()"> <span id="togLink">Kayıt Ol</span></a>
    </div>
  </div>
</div>

<!-- DASHBOARD PAGE -->
<div id="dashPage" class="page">
  <div class="dashHead">
    <div>
      <h1 id="dashGreet">Merhaba 👋</h1>
      <p style="color:var(--text2);font-size:13px">CV'lerini yönet, düzenle ve indir.</p>
    </div>
    <button class="btn btn-p" onclick="newCV()">+ Yeni CV</button>
  </div>
  <div id="cvList" class="cvGrid"></div>
</div>

<!-- BUILDER PAGE -->
<div id="buildPage" class="page">
  <div id="buildTop">
    <div style="display:flex;align-items:center;gap:8px">
      <button class="btn btn-s" style="padding:6px 10px;font-size:12px" onclick="goTo('dash')">← Dashboard</button>
      <input id="buildTitle" placeholder="CV Başlığı..." oninput="cvData.title=this.value;scheduleSave()"/>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-s" style="padding:6px 12px;font-size:12px" onclick="togglePreviewPanel()">👁 Önizleme</button>
      <button class="btn btn-s" style="padding:6px 12px;font-size:12px" id="saveBtn" onclick="manualSave()">💾 Kaydet</button>
      <button class="btn btn-p" style="padding:6px 12px;font-size:12px" onclick="downloadPDF()">⬇ PDF İndir</button>
    </div>
  </div>
  <div id="buildBody">
    <div id="stepSidebar"></div>
    <div id="formArea"></div>
    <div id="previewArea">
      <div id="cvWrap"></div>
    </div>
  </div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, getDocs, deleteDoc, collection, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAEXr79-tcYpSAkYMj63IzUJqHzwBBrhTQ",
  authDomain: "cv-builder-5a99e.firebaseapp.com",
  projectId: "cv-builder-5a99e",
  storageBucket: "cv-builder-5a99e.firebasestorage.app",
  messagingSenderId: "197718816823",
  appId: "1:197718816823:web:ceedf9f0e4fd0e70fda7b2",
  measurementId: "G-YBGMRNXL6C"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);
const gp   = new GoogleAuthProvider();
gp.setCustomParameters({prompt:'select_account'});

// ─── expose to global ───
window._auth=auth; window._db=db; window._gp=gp;
window._signInWithPopup=signInWithPopup;
window._signInWithEmail=signInWithEmailAndPassword;
window._createUser=createUserWithEmailAndPassword;
window._updateProfile=updateProfile;
window._signOut=signOut;
window._doc=doc; window._setDoc=setDoc; window._getDoc=getDoc;
window._getDocs=getDocs; window._deleteDoc=deleteDoc;
window._collection=collection; window._query=query;
window._orderBy=orderBy; window._serverTimestamp=serverTimestamp;

window._onAuthStateChanged=onAuthStateChanged;

// Auth listener
onAuthStateChanged(auth, user => {
  if(user){
    window.currentUser=user;
    document.getElementById('navName').textContent=user.displayName||user.email;
    document.getElementById('navbar').style.display='flex';
    goTo('dash');
    loadDash();
  } else {
    window.currentUser=null;
    document.getElementById('navbar').style.display='none';
    goTo('auth');
  }
});
</script>

<script>
// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let authMode='login';
let currentCvId=null;
let saveTimer=null;
let previewVisible=true;

let cvData={
  title:'Yeni CV', theme:'modern',
  accent:'#6c63ff', layout:'two-column',
  photo:'',
  name:'', jobtitle:'', email:'', phone:'', location:'',
  linkedin:'', github:'', website:'', birthdate:'', nationality:'', license:'', military:'',
  summary:'',
  exp:[], edu:[], skills:[], projects:[]
};

const STEPS=[
  {id:'personal', icon:'👤', label:'Kişisel Bilgiler'},
  {id:'summary',  icon:'📝', label:'Özet'},
  {id:'exp',      icon:'💼', label:'Deneyim'},
  {id:'edu',      icon:'🎓', label:'Eğitim'},
  {id:'skills',   icon:'⚡', label:'Beceriler'},
  {id:'projects', icon:'🚀', label:'Projeler'},
  {id:'customize',icon:'🎨', label:'Özelleştir'},
];
let activeStep=0;

// ══════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════
function goTo(p){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  if(p==='auth'){document.getElementById('authPage').classList.add('active');return;}
  if(p==='dash'){document.getElementById('dashPage').classList.add('active');return;}
  if(p==='build'){document.getElementById('buildPage').classList.add('active');return;}
}

// ══════════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════════
function toggleMode(){
  authMode=authMode==='login'?'register':'login';
  document.getElementById('regName').style.display=authMode==='register'?'block':'none';
  document.getElementById('togText').textContent=authMode==='login'?'Hesabın yok mu?':'Zaten hesabın var mı?';
  document.getElementById('togLink').textContent=authMode==='login'?'Kayıt Ol':'Giriş Yap';
  document.getElementById('authBtn').textContent=authMode==='login'?'Giriş Yap':'Hesap Oluştur';
  document.getElementById('authErr').style.display='none';
}

function showErr(msg){
  const el=document.getElementById('authErr');
  el.textContent=msg; el.style.display='block';
}

function errMsg(code){
  const m={'auth/user-not-found':'Bu e-posta kayıtlı değil.','auth/wrong-password':'Şifre hatalı.','auth/invalid-credential':'E-posta veya şifre hatalı.','auth/email-already-in-use':'Bu e-posta zaten kullanımda.','auth/weak-password':'Şifre en az 6 karakter olmalı.','auth/invalid-email':'Geçersiz e-posta.'};
  return m[code]||'Bir hata oluştu. Tekrar deneyin.';
}

async function googleLogin(){
  try{
    await window._signInWithPopup(window._auth,window._gp);
  }catch(e){showErr('Google girişi başarısız.');}
}

async function emailAuth(){
  const email=document.getElementById('inEmail').value.trim();
  const pw=document.getElementById('inPw').value;
  if(!email||!pw){showErr('E-posta ve şifre zorunludur.');return;}
  document.getElementById('authBtn').textContent='Lütfen bekleyin...';
  try{
    if(authMode==='login'){
      await window._signInWithEmail(window._auth,email,pw);
    } else {
      const name=document.getElementById('inName').value.trim();
      if(!name){showErr('İsim zorunludur.');document.getElementById('authBtn').textContent='Hesap Oluştur';return;}
      const cred=await window._createUser(window._auth,email,pw);
      await window._updateProfile(cred.user,{displayName:name});
    }
  }catch(e){showErr(errMsg(e.code));document.getElementById('authBtn').textContent=authMode==='login'?'Giriş Yap':'Hesap Oluştur';}
}

async function doLogout(){
  await window._signOut(window._auth);
}

// ══════════════════════════════════════════════
// DASHBOARD
// ══════════════════════════════════════════════
async function loadDash(){
  const uid=window.currentUser.uid;
  const name=(window.currentUser.displayName||'Kullanıcı').split(' ')[0];
  document.getElementById('dashGreet').textContent=`Merhaba, ${name} 👋`;
  const container=document.getElementById('cvList');
  container.innerHTML='<p style="color:var(--text2);font-size:13px">Yükleniyor...</p>';
  try{
    const q=window._query(window._collection(window._db,'users',uid,'cvs'),window._orderBy('updatedAt','desc'));
    const snap=await window._getDocs(q);
    const cvs=snap.docs.map(d=>({id:d.id,...d.data()}));
    renderDash(cvs);
  }catch(e){container.innerHTML='<p style="color:var(--red)">Yüklenemedi.</p>';}
}

const THEME_COLORS={modern:'#6c63ff',classic:'#2c3e50',minimal:'#333',bold:'#e74c3c',elegant:'#8e44ad'};
const THEME_LABELS={modern:'Modern',classic:'Klasik',minimal:'Minimal',bold:'Bold',elegant:'Elegant'};

function renderDash(cvs){
  const container=document.getElementById('cvList');
  if(cvs.length===0){
    container.innerHTML=`<div class="empty"><div class="ei">📄</div><h3>Henüz CV Yok</h3><p>İlk profesyonel CV'ni oluşturmaya başla!</p><button class="btn btn-p" onclick="newCV()">+ Yeni CV Oluştur</button></div>`;
    return;
  }
  container.innerHTML='';
  cvs.forEach(cv=>{
    const color=THEME_COLORS[cv.theme]||'#6c63ff';
    const label=THEME_LABELS[cv.theme]||'Modern';
    const ts=cv.updatedAt?.toDate ? timeAgo(cv.updatedAt.toDate()) : 'Az önce';
    const card=document.createElement('div');
    card.className='cvCard fade';
    card.innerHTML=`
      <div class="cvCardTop" style="background:${color}"></div>
      <div class="cvCardBody">
        <div class="cvCardTitle">${escH(cv.title||'İsimsiz CV')}</div>

function newCV(){
  const id='cv_'+Date.now();
  cvData={title:'Yeni CV',theme:'modern',accent:'#6c63ff',layout:'two-column',photo:'',name:'',jobtitle:'',email:'',phone:'',location:'',linkedin:'',github:'',website:'',birthdate:'',nationality:'',license:'',military:'',summary:'',exp:[],edu:[],skills:[],projects:[]};
  currentCvId=id;
  openBuilder();
}

async function editCV(id){
  const uid=window.currentUser.uid;
  const snap=await window._getDoc(window._doc(window._db,'users',uid,'cvs',id));
  if(snap.exists()){
    cvData={...cvData,...snap.data()};
    currentCvId=id;
    openBuilder();
  }
}

async function delCV(id,btn){
  if(!confirm('Bu CV silinsin mi?'))return;
  const uid=window.currentUser.uid;
  await window._deleteDoc(window._doc(window._db,'users',uid,'cvs',id));
  btn.closest('.cvCard').remove();
  if(document.querySelectorAll('.cvCard').length===0)renderDash([]);
}

function openBuilder(){
  activeStep=0;
  goTo('build');
  document.getElementById('buildTitle').value=cvData.title||'';
  renderSidebar();
  renderStep();
  renderPreview();
}

function togglePreviewPanel(){
  previewVisible=!previewVisible;
  document.getElementById('previewArea').style.display=previewVisible?'':'none';
}

function renderSidebar(){
  const sb=document.getElementById('stepSidebar');
  sb.innerHTML='';
  STEPS.forEach((s,i)=>{
    const btn=document.createElement('button');
    btn.className='stepBtn'+(i===activeStep?' active':i<activeStep?' done':'');
    btn.innerHTML=`<span class="si">${s.icon}</span><span>${s.label}</span>${i<activeStep?'<span style="margin-left:auto;font-size:10px;color:var(--green)">✓</span>':''}`;
    btn.onclick=()=>{activeStep=i;renderSidebar();renderStep();};
    sb.appendChild(btn);
  });
}

function renderStep(){
  const fa=document.getElementById('formArea');
  const s=STEPS[activeStep];
  fa.innerHTML='';
  const fns={personal:stepPersonal,summary:stepSummary,exp:stepExp,edu:stepEdu,skills:stepSkills,projects:stepProjects,customize:stepCustomize};
  fns[s.id]();
  fa.innerHTML+=`<div class="stepNav">
    <button class="btn btn-s" onclick="prevStep()" ${activeStep===0?'disabled':''}>← Geri</button>
    <button class="btn btn-p" onclick="nextStep()" ${activeStep===STEPS.length-1?'disabled':''}>İleri →</button>
  </div>`;
}

function prevStep(){if(activeStep>0){activeStep--;renderSidebar();renderStep();}}
function nextStep(){if(activeStep<STEPS.length-1){activeStep++;renderSidebar();renderStep();}}

function setTheme(t){cvData.theme=t;renderPreview();scheduleSave();stepCustomize();}
function setAccent(c){cvData.accent=c;renderPreview();scheduleSave();document.querySelectorAll('.colorDot').forEach(d=>{d.classList.toggle('sel',d.style.background===c||d.style.background==='rgb('+hexToRgb(c)+')')});}
function setLayout(l){cvData.layout=l;renderPreview();scheduleSave();stepCustomize();}
function hexToRgb(h){const r=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h);return r?parseInt(r[1],16)+', '+parseInt(r[2],16)+', '+parseInt(r[3],16):null;}

// entry helpers
function toggleEntry(id){const el=document.getElementById(id);if(el)el.classList.toggle('open');}
function removeEntry(key,i){cvData[key].splice(i,1);const fns={exp:renderExpList,edu:renderEduList,projects:renderProjList};fns[key]&&fns[key]();renderPreview();scheduleSave();}

// SAVE
// ══════════════════════════════════════════════
function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>saveCV(true),2500);
}
async function manualSave(){
  document.getElementById('saveBtn').textContent='💾 Kaydediliyor...';
  await saveCV(false);
  document.getElementById('saveBtn').textContent='✓ Kaydedildi';
  setTimeout(()=>document.getElementById('saveBtn').textContent='💾 Kaydet',2000);
}
async function saveCV(silent){
  if(!window.currentUser||!currentCvId)return;
  const uid=window.currentUser.uid;
  try{
    await window._setDoc(window._doc(window._db,'users',uid,'cvs',currentCvId),
      {...cvData,updatedAt:window._serverTimestamp()},{merge:true});
  }catch(e){if(!silent)alert('Kayıt hatası: '+e.message);}
}

// PDF

function downloadPDF(){
  const el=document.getElementById('cvWrap');
  const name=(cvData.name||'CV').replace(/[^a-zA-ZğüşöçıİĞÜŞÖÇ\s]/g,'');
  html2pdf().set({
    margin:0, filename:`${name}_CV.pdf`,
    image:{type:'jpeg',quality:0.97},
    html2canvas:{scale:2,useCORS:true,logging:false},
    jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}
  }).from(el).save();
}

// CV PREVIEW RENDERER
// ══════════════════════════════════════════════
function renderPreview(){
  const wrap=document.getElementById('cvWrap');
  if(!wrap)return;
  const theme=cvData.theme||'modern';
  const ac=cvData.accent||'#6c63ff';
  const fns={modern:renderModern,classic:renderClassic,minimal:renderMinimal,bold:renderBold,elegant:renderElegant};
  wrap.innerHTML=(fns[theme]||renderModern)(cvData,ac);
}

// ── Shared helpers ──
const cv_esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const cv_dt=(s,e,cur)=>s?(s+(cur?' — Hâlâ':(e?' — '+e:''))):'';
const cv_sec=(title,ac)=>`<div style="font-size:10px;font-weight:bold;letter-spacing:1.5px;text-transform:uppercase;color:${ac};border-bottom:1.5px solid ${ac};padding-bottom:3px;margin-bottom:8px;margin-top:16px">${title}</div>`;

    ${d.summary?`<p style="font-size:10px;line-height:1.75;color:#444;margin:0 0 22px;max-width:540px">${cv_esc(d.summary)}</p>`:''}
    ${d.exp.map(e=>`<div style="display:flex;gap:20px;margin-bottom:14px"><div style="width:90px;flex-shrink:0;font-size:8px;color:#bbb;text-align:right;padding-top:2px">${e.start||''}<br/>${e.current?'Hâlâ':e.end||''}</div><div style="flex:1;padding-left:16px;border-left:1px solid #e0e0e0"><div style="font-weight:bold;font-size:10.5px">${cv_esc(e.title)}</div><div style="font-size:9.5px;color:#888;margin-bottom:3px">${cv_esc(e.company)}</div>${e.desc?`<p style="font-size:9px;color:#666;line-height:1.55;margin:0">${cv_esc(e.desc)}</p>`:''}</div></div>`).join('')}
    ${d.edu.map(e=>`<div style="display:flex;gap:20px;margin-bottom:12px"><div style="width:90px;flex-shrink:0;font-size:8px;color:#bbb;text-align:right">${e.start||''}<br/>${e.current?'Devam':e.end||''}</div><div style="flex:1;padding-left:16px;border-left:1px solid #e0e0e0"><div style="font-weight:bold;font-size:10.5px">${cv_esc(e.school)}</div><div style="font-size:9px;color:#888">${cv_esc(e.degree)}${e.field?' — '+cv_esc(e.field):''}</div></div></div>`).join('')}
    ${d.skills.length?`<div style="margin-top:18px;padding-top:14px;border-top:1px solid #e0e0e0">${d.skills.map(s=>`<span style="font-size:9px;color:#555;padding:2px 7px;border:1px solid #ddd;border-radius:1px;margin:2px;display:inline-block">${cv_esc(s.name)}</span>`).join('')}</div>`:''}
  </div>`;
}

// ─── BOLD ───
function renderBold(d,ac){
  const lvlW={Başlangıç:'30%',Orta:'55%',İleri:'78%',Uzman:'95%'};
  return `<div style="font-family:Arial,sans-serif;font-size:10px;color:#222;background:#fff;min-height:1040px">
    <div style="background:#111;padding:28px 32px;display:flex;align-items:center;gap:18px">
      ${d.photo?`<img src="${d.photo}" style="width:76px;height:76px;border-radius:4px;object-fit:cover;border:3px solid ${ac};flex-shrink:0"/>`:`<div style="width:76px;height:76px;border-radius:4px;background:${ac};display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0">👤</div>`}
      <div><h1 style="font-size:26px;font-weight:900;color:#fff;margin:0;letter-spacing:-.5px">${cv_esc(d.name)||'AD SOYAD'}</h1><div style="font-size:12px;color:${ac};font-weight:700;margin-top:4px">${cv_esc(d.jobtitle)}</div><div style="display:flex;gap:12px;margin-top:7px;flex-wrap:wrap">${[d.email,d.phone,d.location].filter(Boolean).map(v=>`<span style="font-size:8.5px;color:rgba(255,255,255,.6)">${cv_esc(v)}</span>`).join('')}</div></div>
    </div>
    <div style="display:flex">
      <div style="flex:1;padding:24px 28px">
        ${d.summary?`<div style="padding:12px 14px;background:${ac}12;border-left:4px solid ${ac};border-radius:0 4px 4px 0;margin-bottom:18px"><p style="font-size:9.5px;line-height:1.6;color:#444;margin:0">${cv_esc(d.summary)}</p></div>`:''}
        ${d.exp.length?`<div style="margin-bottom:18px"><h2 style="font-size:12px;font-weight:900;color:#111;display:flex;align-items:center;gap:8px;margin-bottom:12px"><span style="width:22px;height:3px;background:${ac};display:inline-block"></span>DENEYİM</h2>${d.exp.map(e=>`<div style="margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #f0f0f0"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="font-weight:bold;font-size:10.5px">${cv_esc(e.title)}</div><div style="color:${ac};font-weight:700;font-size:9.5px">${cv_esc(e.company)}</div></div><span style="font-size:8.5px;background:#f5f5f5;padding:2px 7px;border-radius:2px;color:#999">${cv_dt(e.start,e.end,e.current)}</span></div>${e.desc?`<p style="font-size:9px;color:#555;line-height:1.5;margin:5px 0 0">${cv_esc(e.desc)}</p>`:''}</div>`).join('')}</div>`:''}
        ${d.projects.length?`<div><h2 style="font-size:12px;font-weight:900;color:#111;display:flex;align-items:center;gap:8px;margin-bottom:12px"><span style="width:22px;height:3px;background:${ac};display:inline-block"></span>PROJELER</h2>${d.projects.map(p=>`<div style="margin-bottom:9px"><div style="font-weight:bold;font-size:10.5px">${cv_esc(p.name)}</div>${p.tech?`<div style="font-size:8.5px;color:${ac}">${cv_esc(p.tech)}</div>`:''}${p.desc?`<p style="font-size:9px;color:#555;margin:2px 0 0;line-height:1.5">${cv_esc(p.desc)}</p>`:''}</div>`).join('')}</div>`:''}
      </div>
      <div style="width:175px;background:#f7f7f7;padding:24px 16px;border-left:1px solid #eee;flex-shrink:0">
        ${d.edu.length?`<h2 style="font-size:10px;font-weight:900;color:#111;margin-bottom:10px">EĞİTİM</h2>${d.edu.map(e=>`<div style="margin-bottom:10px"><div style="font-weight:bold;font-size:9.5px">${cv_esc(e.school)}</div><div style="font-size:8.5px;color:${ac}">${cv_esc(e.degree)}</div><div style="font-size:8px;color:#999">${cv_dt(e.start,e.end,e.current)}</div></div>`).join('')}`:''}
        ${d.skills.length?`<h2 style="font-size:10px;font-weight:900;color:#111;margin:14px 0 10px">BECERİLER</h2>${d.skills.map(s=>`<div style="margin-bottom:6px"><div style="font-size:9px;font-weight:bold;margin-bottom:2px">${cv_esc(s.name)}</div><div class="skillBar"><div class="skillBarFill" style="background:${ac};width:${lvlW[s.lvl]||'60%'}"></div></div></div>`).join('')}`:''}
      </div>
    </div>
  </div>`;
}

// ─── ELEGANT ───
function renderElegant(d,ac){
  const sep=`<div style="display:flex;align-items:center;gap:10px;margin:16px 0"><div style="height:1px;flex:1;background:#ddd"></div><div style="width:4px;height:4px;border-radius:50%;background:#ddd"></div><div style="height:1px;flex:1;background:#ddd"></div></div>`;
  const eTitle=(t)=>`<div style="font-size:9.5px;font-weight:400;letter-spacing:3px;text-transform:uppercase;color:${ac};margin-bottom:12px;padding-bottom:4px;border-bottom:1px solid ${ac}35">${t}</div>`;
  return `<div style="font-family:Garamond,Georgia,serif;font-size:10px;color:#2d2d2d;padding:44px 48px;background:#faf8f5;min-height:1040px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:24px"><div style="height:1px;flex:1;background:${ac}"></div><div style="width:6px;height:6px;border-radius:50%;background:${ac}"></div><div style="height:1px;flex:1;background:${ac}"></div></div>
    <div style="text-align:center;margin-bottom:24px">
      ${d.photo?`<img src="${d.photo}" style="width:84px;height:84px;border-radius:50%;object-fit:cover;border:3px solid ${ac};display:block;margin:0 auto 12px"/>`:''}
      <h1 style="font-size:28px;font-weight:400;letter-spacing:3px;color:#111;margin:0 0 5px">${cv_esc(d.name).toUpperCase()||'AD SOYAD'}</h1>
      <div style="font-size:11px;color:${ac};letter-spacing:2px;font-style:italic;margin-bottom:12px">${cv_esc(d.jobtitle)}</div>
      <div style="display:flex;justify-content:center;gap:18px;flex-wrap:wrap;font-size:8.5px;color:#888">${[d.email,d.phone,d.location].filter(Boolean).map(v=>`<span>${cv_esc(v)}</span>`).join('')}</div>
    </div>
    ${sep}
    ${d.summary?`<p style="font-size:10px;line-height:1.8;color:#555;font-style:italic;text-align:center;max-width:520px;margin:0 auto 22px">${cv_esc(d.summary)}</p>${sep}`:''}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:28px">
      <div>
        ${d.exp.length?`${eTitle('Deneyim')}${d.exp.map(e=>`<div style="margin-bottom:12px"><div style="font-weight:bold;font-size:10.5px">${cv_esc(e.title)}</div><div style="font-size:9.5px;color:${ac};font-style:italic;margin-bottom:2px">${cv_esc(e.company)}</div><div style="font-size:8.5px;color:#aaa;margin-bottom:3px">${cv_dt(e.start,e.end,e.current)}</div>${e.desc?`<p style="font-size:9px;color:#666;line-height:1.6;margin:0">${cv_esc(e.desc)}</p>`:''}</div>`).join('')}`:''}
        ${d.projects.length?`${eTitle('Projeler')}${d.projects.map(p=>`<div style="margin-bottom:9px"><div style="font-weight:bold;font-size:10.5px">${cv_esc(p.name)}</div>${p.tech?`<div style="font-size:8.5px;color:${ac};font-style:italic">${cv_esc(p.tech)}</div>`:''}${p.desc?`<p style="font-size:9px;color:#666;line-height:1.5;margin:2px 0 0">${cv_esc(p.desc)}</p>`:''}</div>`).join('')}`:''}
      </div>
      <div>
        ${d.edu.length?`${eTitle('Eğitim')}${d.edu.map(e=>`<div style="margin-bottom:11px"><div style="font-weight:bold;font-size:10.5px">${cv_esc(e.school)}</div><div style="font-size:9.5px;color:${ac};font-style:italic">${cv_esc(e.degree)}${e.field?' — '+cv_esc(e.field):''}</div><div style="font-size:8.5px;color:#aaa">${cv_dt(e.start,e.end,e.current)}</div></div>`).join('')}`:''}
        ${d.skills.length?`${eTitle('Beceriler')}<div>${d.skills.map(s=>`<span style="display:inline-block;font-size:9px;padding:3px 10px;border:1px solid ${ac}35;border-radius:99px;color:#555;margin:2px;font-style:italic">${cv_esc(s.name)}</span>`).join('')}</div>`:''}
      </div>
    </div>
  </div>`;
}

// ══════════════════════════════════════════════
// UTILITIES
// ══════════════════════════════════════════════
function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function timeAgo(d){const s=Math.floor((Date.now()-d)/1000);if(s<60)return 'Az önce';if(s<3600)return Math.floor(s/60)+' dk önce';if(s<86400)return Math.floor(s/3600)+' sa önce';return Math.floor(s/86400)+' gün önce';}
